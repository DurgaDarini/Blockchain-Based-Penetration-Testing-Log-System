<!DOCTYPE html>
<html>
<head>
  <title>Add Finding</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="scan-line"></div>

<div class="layout">

  <aside class="sidebar">
    <h2>Pentest</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="add-finding.html">Add Finding</a>
    <a href="view-findings.html">View Findings</a>
    <a href="analytics.html">Analytics</a>
    <a href="#" onclick="logout()">Logout</a>
  </aside>

  <main class="content">

    <div class="typing-title">Add Finding</div>

    <div class="card">
      <form id="findingForm">

        <input type="text" id="target" placeholder="Target System" required>

        <select id="severity" required>
          <option value="">Select Severity</option>
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
          <option>Critical</option>
        </select>

        <textarea id="description" placeholder="Description" required></textarea>

        <input type="text" id="evidence" placeholder="Evidence Hash" required>

        <input type="text" id="tester" placeholder="Tester Name" required>

        <button type="submit">Submit Finding</button>

      </form>
    </div>

  </main>

</div>

<script>
const role = localStorage.getItem("role");

if (!role) {
  window.location.href = "login.html";
}

if (role !== "tester" && role !== "admin") {
  window.location.href = "dashboard.html";
}

function logout() {
  localStorage.removeItem("role");
  window.location.href = "login.html";
}

document.getElementById("findingForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const target = document.getElementById("target").value;
  const severity = document.getElementById("severity").value;
  const description = document.getElementById("description").value;
  const evidence = document.getElementById("evidence").value;
  const tester = document.getElementById("tester").value;

  const response = await fetch("http://localhost:5000/addFinding", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ target, severity, description, evidence, tester })
  });

  const result = await response.json();

  if(response.ok){
    alert("Stored Successfully\nTX: " + result.txHash);
    document.getElementById("findingForm").reset();
  } else {
    alert(result.error);
  }
});
</script>

</body>
</html>
