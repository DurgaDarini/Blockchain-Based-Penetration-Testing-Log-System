<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="scan-line"></div>

<div class="layout">

  <aside class="sidebar">
    <h2>Pentest</h2>
    <div id="menu"></div>
    <a href="#" onclick="logout()">Logout</a>
  </aside>

  <main class="content">

    <div class="typing-title">Dashboard</div>

    <div class="card">
      <h3 id="welcomeText"></h3>
    </div>

    <div class="card">
      <h3>Total Findings</h3>
      <h2 id="counter">0</h2>
    </div>

  </main>

</div>

<script>
const role = localStorage.getItem("role");
if (!role) {
  window.location.href = "login.html";
}

const menu = document.getElementById("menu");

let menuHTML = `<a href="dashboard.html">Dashboard</a>`;

if (role === "tester") {
  menuHTML += `
    <a href="add-finding.html">Add Finding</a>
    <a href="view-findings.html">View Findings</a>
  `;
}

if (role === "auditor") {
  menuHTML += `
    <a href="view-findings.html">View Findings</a>
  `;
}

if (role === "admin") {
  menuHTML += `
    <a href="add-finding.html">Add Finding</a>
    <a href="view-findings.html">View Findings</a>
    <a href="analytics.html">Analytics</a>
  `;
}

menu.innerHTML = menuHTML;

document.getElementById("welcomeText").innerText =
  "Logged in as: " + role.toUpperCase();

function logout() {
  localStorage.removeItem("role");
  window.location.href = "login.html";
}

async function loadCounter() {
  try {
    const res = await fetch("http://localhost:5000/getAllFindings");
    const data = await res.json();
    document.getElementById("counter").innerText = data.length;
  } catch {
    document.getElementById("counter").innerText = "0";
  }
}

loadCounter();
</script>

</body>
</html>
