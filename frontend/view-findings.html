<!DOCTYPE html>
<html>
<head>
  <title>View Findings</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="scan-line"></div>

<div class="layout">

  <aside class="sidebar">
    <h2>Pentest</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="add-finding.html">Add Finding</a>
    <a href="view-findings.html">View Findings</a>
    <a href="analytics.html">Analytics</a>
    <a href="#" onclick="logout()">Logout</a>
  </aside>

  <main class="content">

    <div class="typing-title">View Findings</div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Target</th>
            <th>Severity</th>
            <th>Description</th>
            <th>Evidence</th>
            <th>Tester</th>
            <th>Timestamp</th>
          </tr>
        </thead>
        <tbody id="findingsTable"></tbody>
      </table>
    </div>

  </main>

</div>

<script>
const role = localStorage.getItem("role");

if (!role) {
  window.location.href = "login.html";
}

function logout() {
  localStorage.removeItem("role");
  window.location.href = "login.html";
}

async function loadFindings() {
  const response = await fetch("http://localhost:5000/getAllFindings");
  const findings = await response.json();

  const table = document.getElementById("findingsTable");
  table.innerHTML = "";

  findings.forEach(finding => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${finding.id}</td>
      <td>${finding.target}</td>
      <td>${finding.severity}</td>
      <td>${finding.description}</td>
      <td>${finding.evidence}</td>
      <td>${finding.tester}</td>
      <td>${finding.timestamp}</td>
    `;

    table.appendChild(row);
  });
}

loadFindings();
</script>

</body>
</html>
