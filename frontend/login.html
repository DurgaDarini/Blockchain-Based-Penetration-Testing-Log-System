<!DOCTYPE html>
<html>
<head>
  <title>Cyber Security Login</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      overflow: hidden;
      background: #0f0f1a;
      position: relative;
    }

    /* ===============================
       MOVING GRID BACKGROUND
    =============================== */

    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background:
        linear-gradient(transparent 95%, rgba(0,242,255,0.15) 100%),
        linear-gradient(90deg, transparent 95%, rgba(0,242,255,0.15) 100%);
      background-size: 60px 60px;
      animation: moveGrid 10s linear infinite;
      z-index: 0;
    }

    @keyframes moveGrid {
      from { transform: translate(0, 0); }
      to { transform: translate(-60px, -60px); }
    }

    /* ===============================
       NEON GLOW PULSE
    =============================== */

    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(0,242,255,0.25), transparent 50%);
      animation: pulseGlow 5s infinite alternate;
      z-index: 0;
    }

    @keyframes pulseGlow {
      from { transform: scale(1); }
      to { transform: scale(1.2); }
    }

    /* ===============================
       SCANNING LASER EFFECT
    =============================== */

    .scan-line {
      position: absolute;
      width: 100%;
      height: 3px;
      background: linear-gradient(to right, transparent, #00f2ff, transparent);
      top: -5%;
      animation: scanMove 4s linear infinite;
      z-index: 1;
    }

    @keyframes scanMove {
      from { top: -5%; }
      to { top: 105%; }
    }

    /* ===============================
       LOGIN CONTAINER
    =============================== */

    .login-container {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-card {
      width: 400px;
      padding: 40px;
      border-radius: 15px;
      background: rgba(26, 26, 46, 0.9);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 30px rgba(0,242,255,0.4);
      position: relative;
      overflow: hidden;
    }

    /* Typing Title */
    .typing-title {
      text-align: center;
      color: #00f2ff;
      font-size: 28px;
      margin-bottom: 30px;
      text-shadow: 0 0 15px #00f2ff;
      white-space: nowrap;
      overflow: hidden;
      border-right: 3px solid #00f2ff;
      width: 0;
      animation: typing 3s steps(20) forwards,
                 blink 0.8s infinite;
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    /* Inputs */

    .login-card input {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #0f0f1a;
      color: #fff;
    }

    .login-card input:focus {
      outline: none;
      border-color: #00f2ff;
      box-shadow: 0 0 10px #00f2ff;
    }

    /* Button */

    .login-card button {
      width: 100%;
      padding: 12px;
      border-radius: 30px;
      border: none;
      background: #00f2ff;
      color: #0f0f1a;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .login-card button:hover {
      background: #00c3ff;
      box-shadow: 0 0 20px #00f2ff;
      transform: scale(1.05);
    }

    #errorMsg {
      color: #ff4d4d;
      text-align: center;
      margin-top: 10px;
    }

  </style>
</head>

<body>

  <div class="scan-line"></div>

  <div class="login-container">
    <div class="login-card">

      <div class="typing-title">System Login</div>

      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">

      <button onclick="login()">Login</button>

      <p id="errorMsg"></p>

    </div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const response = await fetch("http://localhost:5000/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (response.ok) {
          localStorage.setItem("role", result.role);
          window.location.href = "dashboard.html";
        } else {
          document.getElementById("errorMsg").innerText = result.error;
        }

      } catch (error) {
        document.getElementById("errorMsg").innerText = "Server not reachable.";
      }
    }
  </script>

</body>
</html>
